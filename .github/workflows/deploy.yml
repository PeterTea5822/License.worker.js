name: Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

      - name: Resolve D1 database
        run: |
          DB_ID="${DATABASE_ID:-}"
          if [ -z "$DB_ID" ]; then
            echo "::error::DATABASE_ID secret is not set"
            exit 1
          fi
          sed -i "s|database_id = \".*\"|database_id = \"$DB_ID\"|" wrangler.toml
        env:
          DATABASE_ID: ${{ secrets.DATABASE_ID }}

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply LICENSE_DB --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set signing keys
        run: |
          [ -z "$SIGNING_PRIVATE_KEY_PKCS8_B64" ] && echo "Skipped: signing keys not set" && exit 0
          echo "$SIGNING_PRIVATE_KEY_PKCS8_B64" | npx wrangler secret put SIGNING_PRIVATE_KEY_PKCS8_B64
          echo "$SIGNING_PUBLIC_KEY_SPKI_B64" | npx wrangler secret put SIGNING_PUBLIC_KEY_SPKI_B64
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SIGNING_PRIVATE_KEY_PKCS8_B64: ${{ secrets.SIGNING_PRIVATE_KEY_PKCS8_B64 }}
          SIGNING_PUBLIC_KEY_SPKI_B64: ${{ secrets.SIGNING_PUBLIC_KEY_SPKI_B64 }}

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
