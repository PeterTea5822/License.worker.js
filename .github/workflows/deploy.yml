name: Deploy

on:
  pull_request:
  push:
    branches:
      - main

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  deploy-preview:
    if: github.event_name == 'pull_request' && secrets.ENABLE_PREVIEW == 'true'
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Resolve D1 database (preview)
        run: |
          DB_ID="${{ secrets.DATABASE_ID_PREVIEW }}"
          DB_NAME="license-worker-db-preview"

          if [ -z "$DB_ID" ]; then
            echo "Creating D1 database: $DB_NAME"
            RESULT=$(npx wrangler d1 create "$DB_NAME" --json 2>/dev/null)
            DB_ID=$(echo "$RESULT" | grep -o '"uuid": *"[^"]*"' | head -1 | grep -o '"[^"]*"$' | tr -d '"')
            if [ -z "$DB_ID" ]; then
              echo "::error::Failed to create D1 database"
              exit 1
            fi
            echo "Created database with ID: $DB_ID"
            gh secret set DATABASE_ID_PREVIEW --body "$DB_ID"
          else
            echo "Using existing database: $DB_ID"
          fi

          # Inject database_id into wrangler.toml
          sed -i "s|database_id = \".*\"|database_id = \"$DB_ID\"|" wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GH_TOKEN: ${{ github.token }}

      - name: Apply D1 migrations (preview)
        run: npx wrangler d1 migrations apply LICENSE_DB --env preview --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set secrets (preview)
        if: secrets.SIGNING_PRIVATE_KEY_PKCS8_B64 != ''
        run: |
          echo "${{ secrets.SIGNING_PRIVATE_KEY_PKCS8_B64 }}" | npx wrangler secret put SIGNING_PRIVATE_KEY_PKCS8_B64 --env preview
          echo "${{ secrets.SIGNING_PUBLIC_KEY_SPKI_B64 }}" | npx wrangler secret put SIGNING_PUBLIC_KEY_SPKI_B64 --env preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env preview

  deploy-production:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Resolve D1 database (production)
        run: |
          DB_ID="${{ secrets.DATABASE_ID }}"
          DB_NAME="license-worker-db"

          if [ -z "$DB_ID" ]; then
            echo "Creating D1 database: $DB_NAME"
            RESULT=$(npx wrangler d1 create "$DB_NAME" --json 2>/dev/null)
            DB_ID=$(echo "$RESULT" | grep -o '"uuid": *"[^"]*"' | head -1 | grep -o '"[^"]*"$' | tr -d '"')
            if [ -z "$DB_ID" ]; then
              echo "::error::Failed to create D1 database"
              exit 1
            fi
            echo "Created database with ID: $DB_ID"
            gh secret set DATABASE_ID --body "$DB_ID"
          else
            echo "Using existing database: $DB_ID"
          fi

          # Inject database_id into wrangler.toml
          sed -i "s|database_id = \".*\"|database_id = \"$DB_ID\"|" wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GH_TOKEN: ${{ github.token }}

      - name: Apply D1 migrations (production)
        run: npx wrangler d1 migrations apply LICENSE_DB --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set secrets (production)
        if: secrets.SIGNING_PRIVATE_KEY_PKCS8_B64 != ''
        run: |
          echo "${{ secrets.SIGNING_PRIVATE_KEY_PKCS8_B64 }}" | npx wrangler secret put SIGNING_PRIVATE_KEY_PKCS8_B64
          echo "${{ secrets.SIGNING_PUBLIC_KEY_SPKI_B64 }}" | npx wrangler secret put SIGNING_PUBLIC_KEY_SPKI_B64
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy production
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
